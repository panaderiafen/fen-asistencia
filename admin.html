  <meta charset="UTF-8" />

  <style>
/* style.css — fën asistencia */

:root {
  --charcoal:   #28231e;
  --charcoal-2: #3d3630;
  --bone:       #f5edd7;
  --bone-2:     #ede0c4;
  --ember:      #ba7517;
  --ember-light:#faeeda;
  --ember-dark: #854f0b;
  --warning:    #b43c1d;
  --text:       #28231e;
  --text-muted: #7a6f65;
  --border:     #d8cdb8;
  --surface:    #fdf8f0;
  --white:      #ffffff;
  --radius:     10px;
  --radius-sm:  6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.5;
}

/* ── Pantallas ─────────────────────────────────────────── */
.screen { min-height: 100vh; }

.screen-login {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--charcoal);
}

.login-card {
  background: var(--bone);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  text-align: center;
  width: 100%;
  max-width: 320px;
}

.brand {
  font-size: 42px;
  font-weight: 700;
  letter-spacing: -1px;
  color: var(--charcoal);
  font-family: Georgia, serif;
}

.brand-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
  margin-bottom: 1.5rem;
  letter-spacing: 0.5px;
}

.login-hint {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 1.25rem;
  line-height: 1.5;
}

/* ── Header ────────────────────────────────────────────── */
.app-header {
  background: var(--charcoal);
  color: var(--bone);
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0.75rem 1.25rem;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand-sm {
  font-family: Georgia, serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--bone);
  flex: 1;
}

.admin-badge {
  font-family: -apple-system, sans-serif;
  font-size: 11px;
  background: var(--ember);
  color: var(--bone);
  padding: 2px 7px;
  border-radius: 20px;
  font-weight: 500;
  vertical-align: middle;
  margin-left: 6px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--bone-2);
}

.avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--ember);
}

.header-right { display: flex; align-items: center; gap: 8px; }

/* ── Botones ────────────────────────────────────────────── */
button, a.btn-primary {
  cursor: pointer;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  transition: opacity 0.15s, transform 0.1s;
}

.btn-ghost {
  background: transparent;
  color: var(--bone-2);
  border: 1px solid rgba(245,237,215,0.25);
  padding: 6px 12px;
  border-radius: var(--radius-sm);
}
.btn-ghost:hover { background: rgba(255,255,255,0.08); }

.btn-sm { font-size: 12px; padding: 4px 10px; }

.btn-primary {
  background: var(--ember);
  color: var(--bone);
  padding: 10px 20px;
  font-weight: 500;
}
.btn-primary:hover { background: var(--ember-dark); }

.btn-secondary {
  background: var(--bone-2);
  color: var(--charcoal);
  padding: 10px 20px;
  border: 1px solid var(--border);
  font-weight: 500;
}
.btn-secondary:hover { background: var(--bone); }

button:disabled { opacity: 0.4; cursor: not-allowed; }
button:active:not(:disabled) { transform: scale(0.98); }

/* ── Reloj ──────────────────────────────────────────────── */
.clock-section {
  text-align: center;
  padding: 2rem 1rem 1.5rem;
  background: var(--charcoal);
  color: var(--bone);
  border-bottom: 3px solid var(--ember);
}

.clock {
  font-size: 52px;
  font-weight: 300;
  letter-spacing: 3px;
  font-variant-numeric: tabular-nums;
  font-family: 'SF Mono', 'Fira Mono', monospace;
  color: var(--bone);
}

.clock-date {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 4px;
  color: rgba(245,237,215,0.6);
  text-transform: lowercase;
}

/* ── Contenido principal ────────────────────────────────── */
#screen-app > *:not(.app-header):not(.clock-section):not(.admin-tabs) {
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  padding-left: 1.25rem;
  padding-right: 1.25rem;
}

/* ── Estado turno ───────────────────────────────────────── */
.shift-status {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--ember-light);
  border: 1px solid var(--ember);
  border-radius: var(--radius);
  padding: 0.75rem 1rem;
  margin: 1.25rem auto;
  font-size: 14px;
  max-width: 560px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  flex-shrink: 0;
}
.status-dot.active {
  background: #2d8a4e;
  box-shadow: 0 0 0 3px rgba(45,138,78,0.2);
}

/* ── Selector jornada ───────────────────────────────────── */
.jornada-selector {
  max-width: 560px;
  margin: 1rem auto 0.75rem;
}

.label-sm {
  font-size: 12px;
  color: var(--text-muted);
  text-transform: lowercase;
  letter-spacing: 0.4px;
  display: block;
  margin-bottom: 6px;
}

.radio-group {
  display: flex;
  gap: 8px;
}

.radio-option {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 14px;
  cursor: pointer;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--white);
  transition: all 0.15s;
}

.radio-option input[type="radio"] { display: none; }
.radio-option:has(input:checked) {
  background: var(--charcoal);
  color: var(--bone);
  border-color: var(--charcoal);
}
.radio-feriado:has(input:checked) {
  background: var(--warning);
  border-color: var(--warning);
  color: white;
}

/* ── Botones fichar ─────────────────────────────────────── */
.fichar-btns {
  max-width: 560px;
  margin: 0.75rem auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.btn-entrada {
  background: var(--charcoal);
  color: var(--bone);
  padding: 1rem;
  font-size: 15px;
  font-weight: 500;
  border-radius: var(--radius);
  height: 56px;
}
.btn-entrada:not(:disabled):hover { background: var(--charcoal-2); }

.btn-salida {
  background: var(--white);
  color: var(--charcoal);
  border: 1.5px solid var(--border);
  padding: 1rem;
  font-size: 15px;
  font-weight: 500;
  border-radius: var(--radius);
  height: 56px;
}
.btn-salida:not(:disabled):hover { background: var(--bone-2); }

/* ── Alerta extras ──────────────────────────────────────── */
.extras-alert {
  max-width: 560px;
  margin: 0.5rem auto;
  display: flex;
  align-items: center;
  gap: 8px;
  background: #fff3cd;
  border: 1px solid #e6ac00;
  border-radius: var(--radius-sm);
  padding: 0.6rem 1rem;
  font-size: 13px;
  color: #7a5800;
}

.extras-icon { font-size: 16px; }

/* ── Registros recientes ────────────────────────────────── */
.recent-section, .bhe-summary {
  max-width: 560px;
  margin: 1.5rem auto;
}

.section-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--text-muted);
  margin-bottom: 0.75rem;
}

.record-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  flex-wrap: wrap;
}

.record-feriado { background: rgba(180,60,29,0.04); }
.record-date { font-weight: 500; min-width: 90px; }
.record-times { color: var(--text-muted); flex: 1; }
.record-hours { font-weight: 500; color: var(--ember-dark); margin-left: auto; }

.badge-feriado {
  font-size: 11px;
  background: var(--warning);
  color: white;
  padding: 2px 7px;
  border-radius: 20px;
}

/* ── Métricas ───────────────────────────────────────────── */
.metric-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

.metric-grid.mini { grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 8px; }

.metric-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 0.85rem 1rem;
}

.metric-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.metric-value { font-size: 22px; font-weight: 600; color: var(--charcoal); }
.metric-value.text-warning { color: var(--warning); }

/* ── Admin tabs ─────────────────────────────────────────── */
.admin-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  background: var(--white);
  padding: 0 1.25rem;
  overflow-x: auto;
}

.tab {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 0.85rem 1rem;
  font-size: 14px;
  color: var(--text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: color 0.15s;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--ember-dark); border-bottom-color: var(--ember); font-weight: 500; }

.tab-content { padding: 1.5rem 1.25rem; max-width: 800px; margin: 0 auto; }

/* ── Filtros admin ──────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 1.25rem;
  align-items: center;
}

.filter-row select, .filter-row input {
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  background: var(--white);
  color: var(--text);
  font-family: inherit;
}

/* ── Bloques por trabajador ─────────────────────────────── */
.worker-block {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1.25rem;
}

.worker-block-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
}

.worker-name { font-size: 17px; font-weight: 600; color: var(--charcoal); }

.badge-extra {
  font-size: 12px;
  background: #fff3cd;
  color: #7a5800;
  border: 1px solid #e6ac00;
  padding: 3px 9px;
  border-radius: 20px;
}

.badge-ok {
  font-size: 12px;
  background: #d4edda;
  color: #155724;
  padding: 3px 9px;
  border-radius: 20px;
}

.badge-tipo {
  font-size: 11px;
  background: var(--ember-light);
  color: var(--ember-dark);
  border: 1px solid var(--ember);
  padding: 2px 8px;
  border-radius: 20px;
  font-weight: 500;
}

/* ── Tabla detalle ──────────────────────────────────────── */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-top: 1rem;
}

.detail-table th {
  text-align: left;
  padding: 7px 8px;
  font-weight: 600;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.detail-table td {
  padding: 7px 8px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}

.detail-table .row-feriado td { color: var(--warning); }

/* ── PDF actions ────────────────────────────────────────── */
.pdf-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 1rem;
}

/* ── Varios ─────────────────────────────────────────────── */
.empty-state { color: var(--text-muted); font-size: 14px; padding: 1rem 0; }
.error-msg { color: var(--warning); font-size: 13px; margin-top: 1rem; }
.hint-text { font-size: 14px; color: var(--text-muted); line-height: 1.6; }

/* ── Mobile ─────────────────────────────────────────────── */
@media (max-width: 480px) {
  .clock { font-size: 38px; }
  .fichar-btns { grid-template-columns: 1fr; }
  .metric-value { font-size: 18px; }
  .filter-row { flex-direction: column; }
  .filter-row select, .filter-row input { width: 100%; }
}
  </style>
</head>

<script>
// auth.js — Google Sign-In + control de acceso por correo

const Auth = (() => {
  let currentUser = null;
  let workerProfile = null;

  async function init() {
    return new Promise((resolve) => {
      google.accounts.id.initialize({
        client_id: FEN_CONFIG.GOOGLE_CLIENT_ID,
        callback: async (response) => {
          const payload = parseJwt(response.credential);
          currentUser = {
            email: payload.email,
            name: payload.name,
            picture: payload.picture,
          };
          workerProfile = await Sheets.getWorkerByEmail(currentUser.email);
          resolve({ user: currentUser, profile: workerProfile });
        },
        auto_select: false,
      });
      google.accounts.id.renderButton(document.getElementById('google-btn'), {
        theme: 'outline',
        size: 'large',
        text: 'signin_with',
        locale: 'es',
        width: 280,
      });
      google.accounts.id.prompt((notification) => {
        if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
          resolve({});
        }
      });
    });
  }

  function renderButton(containerId) {
    // renderButton ahora se hace dentro de init()
  }

  function parseJwt(token) {
    const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(decodeURIComponent(atob(base64).split('').map(c =>
      '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')));
  }

  function getUser() { return currentUser; }
  function getProfile() { return workerProfile; }
  function isAdmin() {
    if (!currentUser) return false;
    if (currentUser.email === FEN_CONFIG.ADMIN_EMAIL) return true;
    return workerProfile && workerProfile.admin === 'true';
  }
  function isLoggedIn() { return currentUser !== null; }

  function signOut() {
    google.accounts.id.disableAutoSelect();
    currentUser = null;
    workerProfile = null;
    window.location.reload();
  }

  return { init, renderButton, getUser, getProfile, isAdmin, isLoggedIn, signOut };
})();

// sheets.js — lectura y escritura en Google Sheets via API REST

const Sheets = (() => {
  const BASE = 'https://sheets.googleapis.com/v4/spreadsheets';
  let accessToken = null;

  // ─── Token OAuth ──────────────────────────────────────────
  function setToken(token) { accessToken = token; }

  async function getToken() {
    return new Promise((resolve, reject) => {
      const client = google.accounts.oauth2.initTokenClient({
        client_id: FEN_CONFIG.GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets',
        callback: (resp) => {
          if (resp.error) reject(resp.error);
          else { accessToken = resp.access_token; resolve(resp.access_token); }
        },
      });
      client.requestAccessToken({ prompt: '' });
    });
  }

  // ─── Helpers ──────────────────────────────────────────────
  async function read(range) {
    const url = `${BASE}/${FEN_CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?key=${FEN_CONFIG.API_KEY}`;
    const r = await fetch(url);
    const d = await r.json();
    return d.values || [];
  }

  async function write(range, values) {
    if (!accessToken) await getToken();
    const url = `${BASE}/${FEN_CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=USER_ENTERED`;
    await fetch(url, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values }),
    });
  }

  async function append(range, values) {
    if (!accessToken) await getToken();
    const url = `${BASE}/${FEN_CONFIG.SPREADSHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`;
    await fetch(url, {
      method: 'POST',
      headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ values }),
    });
  }

  // ─── Trabajadores ─────────────────────────────────────────
  async function getWorkers() {
    const rows = await read('trabajadores!A2:H');
    return rows.map(r => ({
      email:        r[0] || '',
      nombre:       r[1] || '',
      tipo:         r[2] || '',   // 'contrato' | 'BHE'
      horasSemana:  parseFloat(r[3]) || 0,
      valorHora:    parseFloat(r[4]) || 0,
      activo:       r[5] !== 'false',
      admin:        r[6] === 'true',
    }));
  }

  async function getWorkerByEmail(email) {
    const workers = await getWorkers();
    return workers.find(w => w.email.toLowerCase() === email.toLowerCase()) || null;
  }

  // ─── Registros ────────────────────────────────────────────
  async function getRecords(emailFilter = null) {
    const rows = await read('registros!A2:I');
    let records = rows.map(r => ({
      id:             r[0] || '',
      email:          r[1] || '',
      nombre:         r[2] || '',
      fecha:          r[3] || '',
      entrada:        r[4] || '',
      salida:         r[5] || '',
      tipoJornada:    r[6] || 'ordinaria',  // 'ordinaria' | 'feriado'
      horasTrabajadas: parseFloat(r[7]) || 0,
      observacion:    r[8] || '',
    }));
    if (emailFilter) records = records.filter(r => r.email === emailFilter);
    return records;
  }

  async function checkIn(worker, tipoJornada = 'ordinaria') {
    const now = new Date();
    const id = Date.now().toString();
    const fecha = formatDate(now);
    const entrada = formatTime(now);
    await append('registros!A:I', [[
      id, worker.email, worker.nombre, fecha, entrada, '', tipoJornada, '', ''
    ]]);
    return id;
  }

  async function checkOut(recordId, email) {
    const rows = await read('registros!A2:I');
    const idx = rows.findIndex(r => r[0] === recordId && r[1] === email);
    if (idx === -1) throw new Error('Registro no encontrado');
    const entrada = rows[idx][4];
    const salida = formatTime(new Date());
    const horas = calcHoras(entrada, salida);
    const rowNum = idx + 2;
    await write(`registros!F${rowNum}:H${rowNum}`, [[salida, horas.toFixed(2), '']]);
    return { salida, horas };
  }

  async function getOpenShift(email) {
    const rows = await read('registros!A2:I');
    const open = rows.find(r => r[1] === email && r[4] && !r[5]);
    if (!open) return null;
    return { id: open[0], email: open[1], nombre: open[2], fecha: open[3], entrada: open[4], tipoJornada: open[6] || 'ordinaria' };
  }

  // ─── Feriados ─────────────────────────────────────────────
  async function getFeriados() {
    const rows = await read('feriados!A2:B');
    return rows.map(r => ({ fecha: r[0], descripcion: r[1] || '' }));
  }

  async function isFeriado(fecha) {
    const feriados = await getFeriados();
    return feriados.some(f => f.fecha === fecha);
  }

  // ─── Utils ────────────────────────────────────────────────
  function formatDate(d) {
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate());
  }
  function formatTime(d) {
    return pad(d.getHours()) + ':' + pad(d.getMinutes());
  }
  function pad(n) { return n.toString().padStart(2, '0'); }
  function calcHoras(entrada, salida) {
    const [eh, em] = entrada.split(':').map(Number);
    const [sh, sm] = salida.split(':').map(Number);
    return ((sh * 60 + sm) - (eh * 60 + em)) / 60;
  }

  return {
    setToken, getToken,
    getWorkers, getWorkerByEmail,
    getRecords, checkIn, checkOut, getOpenShift,
    getFeriados, isFeriado,
    formatDate, formatTime, pad,
  };
})();

// reportes.js — cálculo de horas, extras, BHE y resúmenes

const Reportes = (() => {

  // ─── Contrato fijo ────────────────────────────────────────

  function calcResumenContrato(worker, records, mes, anio) {
    const filtered = records.filter(r => {
      if (r.email !== worker.email) return false;
      if (!r.salida) return false;
      const d = new Date(r.fecha);
      return d.getMonth() + 1 === mes && d.getFullYear() === anio;
    });

    // Agrupar por semana ISO
    const semanas = {};
    filtered.forEach(r => {
      const semana = getWeekKey(r.fecha);
      if (!semanas[semana]) semanas[semana] = { horas: 0, dias: [] };
      semanas[semana].horas += parseFloat(r.horasTrabajadas) || 0;
      semanas[semana].dias.push(r);
    });

    const horasContrato = worker.horasSemana;
    let totalHoras = 0;
    let totalExtras = 0;

    Object.values(semanas).forEach(s => {
      totalHoras += s.horas;
      if (s.horas > horasContrato) {
        totalExtras += s.horas - horasContrato;
      }
    });

    const horasOrdinarias = totalHoras - totalExtras;

    return {
      worker,
      mes, anio,
      registros: filtered,
      semanas,
      totalHoras: round2(totalHoras),
      horasOrdinarias: round2(horasOrdinarias),
      horasExtras: round2(totalExtras),
      horasContrato,
      diasTrabajados: filtered.length,
    };
  }

  function tieneExtrasActivas(worker, records) {
    const hoy = new Date();
    const semanaActual = getWeekKey(Sheets.formatDate(hoy));
    const estaSemana = records.filter(r =>
      r.email === worker.email && getWeekKey(r.fecha) === semanaActual
    );
    const horasSemana = estaSemana.reduce((s, r) => s + (parseFloat(r.horasTrabajadas) || 0), 0);
    return horasSemana > worker.horasSemana;
  }

  // ─── BHE ──────────────────────────────────────────────────

  function calcResumenBHE(worker, records, mes, anio) {
    const filtered = records.filter(r => {
      if (r.email !== worker.email) return false;
      if (!r.salida) return false;
      const d = new Date(r.fecha);
      return d.getMonth() + 1 === mes && d.getFullYear() === anio;
    });

    const detalle = filtered.map(r => {
      const horas = parseFloat(r.horasTrabajadas) || 0;
      const esFeriado = r.tipoJornada === 'feriado';
      const valorHora = esFeriado
        ? worker.valorHora * FEN_CONFIG.FERIADO_MULTIPLICADOR
        : worker.valorHora;
      const montoJornada = round0(horas * valorHora);
      return {
        ...r,
        horas,
        esFeriado,
        valorHora: round0(valorHora),
        montoJornada,
      };
    });

    const bruto = detalle.reduce((s, d) => s + d.montoJornada, 0);
    const descuento = round0(bruto * FEN_CONFIG.BHE_DESCUENTO);
    const liquido = bruto - descuento;
    const totalHoras = round2(detalle.reduce((s, d) => s + d.horas, 0));

    return {
      worker,
      mes, anio,
      detalle,
      totalHoras,
      diasTrabajados: detalle.length,
      bruto,
      descuento,
      liquido,
      porcentajeDescuento: FEN_CONFIG.BHE_DESCUENTO * 100,
    };
  }

  // ─── Consolidado contrato (para contadora) ─────────────────

  function calcConsolidado(workers, records, mes, anio) {
    const contratos = workers.filter(w => w.tipo === 'contrato' && w.activo);
    return contratos.map(w => calcResumenContrato(w, records, mes, anio));
  }

  // ─── Helpers ──────────────────────────────────────────────

  function getWeekKey(fechaStr) {
    const d = new Date(fechaStr + 'T12:00:00');
    const dow = d.getDay() || 7;
    d.setDate(d.getDate() + 4 - dow);
    const yearStart = new Date(d.getFullYear(), 0, 1);
    const week = Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
    return `${d.getFullYear()}-W${week.toString().padStart(2, '0')}`;
  }

  function round2(n) { return Math.round(n * 100) / 100; }
  function round0(n) { return Math.round(n); }

  function nombreMes(mes) {
    return ['enero','febrero','marzo','abril','mayo','junio',
            'julio','agosto','septiembre','octubre','noviembre','diciembre'][mes - 1];
  }

  return {
    calcResumenContrato,
    calcResumenBHE,
    calcConsolidado,
    tieneExtrasActivas,
    nombreMes,
    getWeekKey,
  };
})();

// pdf.js — generación de PDFs para contadora (jsPDF via CDN)

const PDF = (() => {

  function headerFen(doc, titulo, subtitulo) {
    doc.setFillColor(40, 35, 30);
    doc.rect(0, 0, 210, 22, 'F');
    doc.setTextColor(245, 235, 215);
    doc.setFontSize(18);
    doc.setFont('helvetica', 'bold');
    doc.text('fën', 14, 14);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'normal');
    doc.text(titulo, 35, 10);
    doc.setFontSize(8);
    doc.setTextColor(180, 160, 130);
    doc.text(subtitulo, 35, 16);
    doc.setTextColor(40, 35, 30);
  }

  function footer(doc, pageNum, totalPages) {
    doc.setFontSize(8);
    doc.setTextColor(150, 140, 130);
    doc.text(`Página ${pageNum} de ${totalPages}`, 105, 290, { align: 'center' });
    doc.text(`Generado el ${new Date().toLocaleDateString('es-CL')}`, 196, 290, { align: 'right' });
    doc.setTextColor(40, 35, 30);
  }

  function amber() { return [186, 117, 23]; }
  function dark()  { return [40, 35, 30]; }
  function gray()  { return [100, 95, 90]; }

  // ─── PDF individual contrato ───────────────────────────────

  function generarPDFContrato(resumen) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    headerFen(doc,
      `Resumen de horas — ${resumen.worker.nombre}`,
      `${Reportes.nombreMes(resumen.mes)} ${resumen.anio} · Contrato`
    );

    let y = 32;

    // Tarjetas resumen
    const tarjetas = [
      ['Horas contrato/semana', resumen.horasContrato + ' h'],
      ['Total horas trabajadas', resumen.totalHoras + ' h'],
      ['Horas ordinarias', resumen.horasOrdinarias + ' h'],
      ['Horas extras', resumen.horasExtras + ' h'],
      ['Días trabajados', resumen.diasTrabajados],
    ];

    const colW = 38;
    tarjetas.forEach((t, i) => {
      const x = 14 + i * (colW + 2);
      doc.setFillColor(245, 240, 230);
      doc.roundedRect(x, y, colW, 18, 2, 2, 'F');
      doc.setFontSize(7);
      doc.setTextColor(...gray());
      doc.text(t[0], x + colW / 2, y + 6, { align: 'center' });
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...(i === 3 && resumen.horasExtras > 0 ? [180, 60, 30] : dark()));
      doc.text(String(t[1]), x + colW / 2, y + 14, { align: 'center' });
      doc.setFont('helvetica', 'normal');
    });

    y += 26;

    // Detalle por semana
    Object.entries(resumen.semanas).forEach(([semana, data]) => {
      const extras = data.horas > resumen.horasContrato ? data.horas - resumen.horasContrato : 0;
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...amber());
      doc.text(`Semana ${semana}  ·  ${data.horas.toFixed(2)} h trabajadas${extras > 0 ? `  ·  ${extras.toFixed(2)} h extras` : ''}`, 14, y);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...dark());
      y += 5;

      // Tabla días
      const headers = ['Fecha', 'Entrada', 'Salida', 'Jornada', 'Horas'];
      const colWidths = [35, 25, 25, 35, 20];
      const startX = 14;

      doc.setFillColor(225, 215, 195);
      doc.rect(startX, y, 140, 7, 'F');
      doc.setFontSize(8);
      doc.setFont('helvetica', 'bold');
      let cx = startX + 2;
      headers.forEach((h, i) => {
        doc.text(h, cx, y + 5);
        cx += colWidths[i];
      });
      doc.setFont('helvetica', 'normal');
      y += 7;

      data.dias.forEach((d, idx) => {
        if (idx % 2 === 0) {
          doc.setFillColor(250, 247, 242);
          doc.rect(startX, y, 140, 6, 'F');
        }
        doc.setFontSize(8);
        cx = startX + 2;
        const esFeriado = d.tipoJornada === 'feriado';
        if (esFeriado) doc.setTextColor(180, 60, 30);
        doc.text(d.fecha, cx, y + 4); cx += colWidths[0];
        doc.text(d.entrada, cx, y + 4); cx += colWidths[1];
        doc.text(d.salida || '—', cx, y + 4); cx += colWidths[2];
        doc.text(esFeriado ? 'Feriado' : 'Ordinaria', cx, y + 4); cx += colWidths[3];
        doc.text(String(d.horasTrabajadas), cx, y + 4);
        doc.setTextColor(...dark());
        y += 6;
      });
      y += 4;

      if (y > 270) { doc.addPage(); y = 30; }
    });

    footer(doc, 1, 1);
    doc.save(`fen_horas_${resumen.worker.nombre.replace(/ /g,'_')}_${resumen.mes}_${resumen.anio}.pdf`);
  }

  // ─── PDF consolidado contrato (para contadora) ─────────────

  function generarPDFConsolidado(resumenes, mes, anio) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let pageNum = 1;

    headerFen(doc,
      `Consolidado de horas — ${Reportes.nombreMes(mes)} ${anio}`,
      `Trabajadores con contrato · fën`
    );

    let y = 32;

    // Tabla resumen general
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...amber());
    doc.text('Resumen general', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...dark());
    y += 6;

    const headers = ['Trabajador', 'H. contrato/sem', 'H. trabajadas', 'H. ordinarias', 'H. extras', 'Días'];
    const colW = [50, 28, 28, 28, 22, 16];
    doc.setFillColor(40, 35, 30);
    doc.rect(14, y, 182, 7, 'F');
    doc.setTextColor(245, 235, 215);
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    let cx = 16;
    headers.forEach((h, i) => { doc.text(h, cx, y + 5); cx += colW[i]; });
    doc.setFont('helvetica', 'normal');
    y += 7;

    resumenes.forEach((r, idx) => {
      doc.setFillColor(idx % 2 === 0 ? 250 : 245, idx % 2 === 0 ? 247 : 243, idx % 2 === 0 ? 242 : 238);
      doc.rect(14, y, 182, 7, 'F');
      doc.setTextColor(...dark());
      cx = 16;
      const vals = [r.worker.nombre, r.horasContrato + ' h', r.totalHoras + ' h',
                    r.horasOrdinarias + ' h', r.horasExtras + ' h', r.diasTrabajados];
      vals.forEach((v, i) => {
        if (i === 4 && r.horasExtras > 0) doc.setTextColor(180, 60, 30);
        doc.setFontSize(8);
        doc.text(String(v), cx, y + 5);
        doc.setTextColor(...dark());
        cx += colW[i];
      });
      y += 7;
    });

    y += 10;

    // Detalle por trabajador
    resumenes.forEach(r => {
      if (y > 240) { doc.addPage(); pageNum++; y = 20; }
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(...amber());
      doc.text(r.worker.nombre, 14, y);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(...gray());
      doc.text(`${r.totalHoras} h trabajadas · ${r.horasExtras} h extras · ${r.diasTrabajados} días`, 70, y);
      doc.setTextColor(...dark());
      y += 5;

      const dh = ['Fecha', 'Entrada', 'Salida', 'Jornada', 'Horas'];
      const dw = [35, 25, 25, 40, 20];
      doc.setFillColor(225, 215, 195);
      doc.rect(14, y, 145, 6, 'F');
      doc.setFontSize(7);
      doc.setFont('helvetica', 'bold');
      cx = 16;
      dh.forEach((h, i) => { doc.text(h, cx, y + 4); cx += dw[i]; });
      doc.setFont('helvetica', 'normal');
      y += 6;

      r.registros.forEach((rec, idx) => {
        if (y > 275) { doc.addPage(); pageNum++; y = 20; }
        if (idx % 2 === 0) { doc.setFillColor(250, 247, 242); doc.rect(14, y, 145, 5, 'F'); }
        cx = 16;
        const esFeriado = rec.tipoJornada === 'feriado';
        if (esFeriado) doc.setTextColor(180, 60, 30);
        doc.setFontSize(7);
        [rec.fecha, rec.entrada, rec.salida || '—', esFeriado ? 'Feriado' : 'Ordinaria', String(rec.horasTrabajadas)]
          .forEach((v, i) => { doc.text(v, cx, y + 4); cx += dw[i]; });
        doc.setTextColor(...dark());
        y += 5;
      });
      y += 8;
    });

    footer(doc, pageNum, pageNum);
    doc.save(`fen_consolidado_contrato_${mes}_${anio}.pdf`);
  }

  // ─── PDF BHE ──────────────────────────────────────────────

  function generarPDFBHE(resumen) {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    headerFen(doc,
      `Boleta de Honorarios — ${resumen.worker.nombre}`,
      `${Reportes.nombreMes(resumen.mes)} ${resumen.anio} · BHE`
    );

    let y = 32;

    // Tarjetas resumen financiero
    const fmt = n => '$' + n.toLocaleString('es-CL');
    const tarjetas = [
      ['Total horas', resumen.totalHoras + ' h'],
      ['Bruto', fmt(resumen.bruto)],
      [`Descuento ${resumen.porcentajeDescuento}%`, fmt(resumen.descuento)],
      ['Líquido', fmt(resumen.liquido)],
    ];
    const colW = 44;
    tarjetas.forEach((t, i) => {
      const x = 14 + i * (colW + 2);
      const isLiquido = i === 3;
      doc.setFillColor(isLiquido ? 40 : 245, isLiquido ? 35 : 240, isLiquido ? 30 : 230);
      doc.roundedRect(x, y, colW, 18, 2, 2, 'F');
      doc.setFontSize(7);
      doc.setTextColor(isLiquido ? 180 : 100, isLiquido ? 160 : 95, isLiquido ? 130 : 90);
      doc.text(t[0], x + colW / 2, y + 6, { align: 'center' });
      doc.setFontSize(11);
      doc.setFont('helvetica', 'bold');
      doc.setTextColor(isLiquido ? 245 : 40, isLiquido ? 235 : 35, isLiquido ? 215 : 30);
      doc.text(String(t[1]), x + colW / 2, y + 14, { align: 'center' });
      doc.setFont('helvetica', 'normal');
    });

    y += 26;

    // Detalle de jornadas
    doc.setFontSize(9);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...amber());
    doc.text('Detalle de jornadas', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(...dark());
    y += 5;

    const headers = ['Fecha', 'Entrada', 'Salida', 'Jornada', 'Horas', 'Valor hora', 'Monto'];
    const colWidths = [28, 20, 20, 25, 15, 28, 30];
    doc.setFillColor(40, 35, 30);
    doc.rect(14, y, 166, 7, 'F');
    doc.setFontSize(8);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(245, 235, 215);
    let cx = 16;
    headers.forEach((h, i) => { doc.text(h, cx, y + 5); cx += colWidths[i]; });
    doc.setFont('helvetica', 'normal');
    y += 7;

    resumen.detalle.forEach((d, idx) => {
      if (y > 270) { doc.addPage(); y = 20; }
      doc.setFillColor(idx % 2 === 0 ? 250 : 245, idx % 2 === 0 ? 247 : 243, idx % 2 === 0 ? 242 : 238);
      doc.rect(14, y, 166, 6, 'F');
      cx = 16;
      doc.setTextColor(d.esFeriado ? 180 : 40, d.esFeriado ? 60 : 35, d.esFeriado ? 30 : 30);
      doc.setFontSize(8);
      [d.fecha, d.entrada, d.salida || '—', d.esFeriado ? 'Feriado ×1.5' : 'Ordinaria',
       d.horas.toFixed(2), fmt(d.valorHora), fmt(d.montoJornada)]
        .forEach((v, i) => { doc.text(v, cx, y + 4); cx += colWidths[i]; });
      doc.setTextColor(...dark());
      y += 6;
    });

    // Total
    y += 2;
    doc.setDrawColor(...amber());
    doc.line(14, y, 180, y);
    y += 5;
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(9);
    doc.text('Bruto', 100, y); doc.text(fmt(resumen.bruto), 180, y, { align: 'right' });
    y += 5;
    doc.setTextColor(180, 60, 30);
    doc.text(`Descuento retención ${resumen.porcentajeDescuento}%`, 100, y);
    doc.text(`- ${fmt(resumen.descuento)}`, 180, y, { align: 'right' });
    y += 5;
    doc.setFillColor(40, 35, 30);
    doc.roundedRect(98, y - 1, 84, 8, 1, 1, 'F');
    doc.setTextColor(245, 235, 215);
    doc.text('Líquido a pagar', 100, y + 5);
    doc.text(fmt(resumen.liquido), 180, y + 5, { align: 'right' });

    footer(doc, 1, 1);
    doc.save(`fen_BHE_${resumen.worker.nombre.replace(/ /g,'_')}_${resumen.mes}_${resumen.anio}.pdf`);
  }

  return { generarPDFContrato, generarPDFConsolidado, generarPDFBHE };
})();

<script>
(async () => {
  await new Promise(resolve => {
    if (typeof google !== 'undefined') { resolve(); return; }
    const interval = setInterval(() => {
      if (typeof google !== 'undefined') { clearInterval(interval); resolve(); }
    }, 100);
  });

  Auth.renderButton('google-btn');
  const { user, profile } = await Auth.init().catch(() => ({}));
  if (!user) return;

  if (!Auth.isAdmin()) {
    document.getElementById('login-error').textContent = 'Acceso restringido al administrador.';
    document.getElementById('login-error').style.display = 'block';
    return;
  }

  document.getElementById('screen-login').style.display = 'none';
  document.getElementById('screen-app').style.display = 'block';
  document.getElementById('btn-logout').addEventListener('click', Auth.signOut);
  document.getElementById('link-sheet').href =
    `https://docs.google.com/spreadsheets/d/${FEN_CONFIG.SPREADSHEET_ID}`;

  await Sheets.getToken();
  const [allRecords, allWorkers] = await Promise.all([Sheets.getRecords(), Sheets.getWorkers()]);

  const years = [...new Set(allRecords.map(r => new Date(r.fecha).getFullYear()))];
  const currentYear = new Date().getFullYear();
  if (!years.includes(currentYear)) years.push(currentYear);
  years.sort((a,b) => b-a);

  ['contrato-anio','bhe-anio'].forEach(id => {
    const sel = document.getElementById(id);
    years.forEach(y => { const o = document.createElement('option'); o.value = y; o.textContent = y; sel.appendChild(o); });
    sel.value = currentYear;
  });

  const contratos = allWorkers.filter(w => w.tipo === 'contrato' && w.activo);
  const bhes = allWorkers.filter(w => w.tipo === 'BHE' && w.activo);
  contratos.forEach(w => { const o = document.createElement('option'); o.value = w.email; o.textContent = w.nombre; document.getElementById('contrato-worker').appendChild(o); });
  bhes.forEach(w => { const o = document.createElement('option'); o.value = w.email; o.textContent = w.nombre; document.getElementById('bhe-worker').appendChild(o); });

  document.getElementById('contrato-mes').value = new Date().getMonth() + 1;
  document.getElementById('bhe-mes').value = new Date().getMonth() + 1;

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
    });
  });

  const openShifts = allRecords.filter(r => r.entrada && !r.salida);
  const today = Sheets.formatDate(new Date());
  const todayRecs = allRecords.filter(r => r.fecha === today && r.salida);
  const hoysHoras = todayRecs.reduce((s,r) => s + r.horasTrabajadas, 0);

  document.getElementById('dash-metrics').innerHTML = [
    ['turnos abiertos', openShifts.length],
    ['turnos hoy', todayRecs.length],
    ['horas hoy', hoysHoras.toFixed(1) + ' h'],
    ['equipo activo', allWorkers.filter(w => w.activo).length],
  ].map(([l,v]) => `<div class="metric-card"><div class="metric-label">${l}</div><div class="metric-value">${v}</div></div>`).join('');

  document.getElementById('dash-open').innerHTML = openShifts.length === 0
    ? '<p class="empty-state">ningún turno abierto ahora</p>'
    : openShifts.map(r => `<div class="record-row"><span class="record-date">${r.nombre}</span><span class="record-times">desde las ${r.entrada} · ${r.tipoJornada}</span></div>`).join('');

  const recent = [...allRecords].filter(r=>r.salida).sort((a,b)=>new Date(b.fecha+' '+b.entrada)-new Date(a.fecha+' '+a.entrada)).slice(0,10);
  document.getElementById('dash-recent').innerHTML = recent.map(r =>
    `<div class="record-row ${r.tipoJornada==='feriado'?'record-feriado':''}">
      <span class="record-date">${r.nombre}</span><span>${r.fecha}</span>
      <span class="record-times">${r.entrada} → ${r.salida}</span>
      <span class="record-hours">${r.horasTrabajadas} h</span>
      ${r.tipoJornada==='feriado'?'<span class="badge-feriado">feriado</span>':''}
    </div>`).join('');

  document.getElementById('workers-list').innerHTML = allWorkers.map(w =>
    `<div class="record-row">
      <span class="record-date">${w.nombre}</span>
      <span class="badge-tipo">${w.tipo}</span>
      <span>${w.tipo==='contrato' ? w.horasSemana+' h/sem' : '$'+w.valorHora.toLocaleString('es-CL')+'/h'}</span>
      <span style="color:var(--text-muted)">${w.email}</span>
    </div>`).join('');

  let contratoResumenes = [];
  document.getElementById('btn-load-contrato').addEventListener('click', () => {
    const emailFil = document.getElementById('contrato-worker').value;
    const mes = parseInt(document.getElementById('contrato-mes').value);
    const anio = parseInt(document.getElementById('contrato-anio').value);
    const workers = emailFil ? contratos.filter(w=>w.email===emailFil) : contratos;
    contratoResumenes = Reportes.calcConsolidado(workers, allRecords, mes, anio);
    document.getElementById('contrato-results').innerHTML = contratoResumenes.map(r => `
      <div class="worker-block">
        <div class="worker-block-header">
          <span class="worker-name">${r.worker.nombre}</span>
          <span class="${r.horasExtras>0?'badge-extra':'badge-ok'}">${r.horasExtras>0?'⚡ '+r.horasExtras+' h extras':'sin extras'}</span>
        </div>
        <div class="metric-grid mini">
          <div class="metric-card"><div class="metric-label">horas trabajadas</div><div class="metric-value">${r.totalHoras} h</div></div>
          <div class="metric-card"><div class="metric-label">ordinarias</div><div class="metric-value">${r.horasOrdinarias} h</div></div>
          <div class="metric-card"><div class="metric-label">extras</div><div class="metric-value ${r.horasExtras>0?'text-warning':''}">${r.horasExtras} h</div></div>
          <div class="metric-card"><div class="metric-label">días</div><div class="metric-value">${r.diasTrabajados}</div></div>
        </div>
        <table class="detail-table">
          <thead><tr><th>fecha</th><th>entrada</th><th>salida</th><th>jornada</th><th>horas</th></tr></thead>
          <tbody>${r.registros.map(rec=>`<tr class="${rec.tipoJornada==='feriado'?'row-feriado':''}">
            <td>${rec.fecha}</td><td>${rec.entrada}</td><td>${rec.salida||'—'}</td>
            <td>${rec.tipoJornada}</td><td>${rec.horasTrabajadas}</td></tr>`).join('')}</tbody>
        </table>
      </div>`).join('');
    document.getElementById('pdf-actions-contrato').style.display = contratoResumenes.length ? 'flex' : 'none';
  });

  document.getElementById('btn-pdf-individual').addEventListener('click', () => {
    const emailFil = document.getElementById('contrato-worker').value;
    if (!emailFil) { alert('Selecciona un trabajador para el PDF individual.'); return; }
    const r = contratoResumenes.find(r=>r.worker.email===emailFil);
    if (r) PDF.generarPDFContrato(r);
  });

  document.getElementById('btn-pdf-consolidado').addEventListener('click', () => {
    const mes = parseInt(document.getElementById('contrato-mes').value);
    const anio = parseInt(document.getElementById('contrato-anio').value);
    PDF.generarPDFConsolidado(contratoResumenes, mes, anio);
  });

  let bheResumen = null;
  document.getElementById('btn-load-bhe').addEventListener('click', () => {
    const email = document.getElementById('bhe-worker').value;
    if (!email) { alert('Selecciona un trabajador.'); return; }
    const mes = parseInt(document.getElementById('bhe-mes').value);
    const anio = parseInt(document.getElementById('bhe-anio').value);
    const worker = bhes.find(w=>w.email===email);
    bheResumen = Reportes.calcResumenBHE(worker, allRecords, mes, anio);
    const fmt = n => '$' + n.toLocaleString('es-CL');
    document.getElementById('bhe-results').innerHTML = `
      <div class="worker-block">
        <div class="worker-block-header">
          <span class="worker-name">${bheResumen.worker.nombre}</span>
          <span class="badge-tipo">BHE</span>
        </div>
        <div class="metric-grid mini">
          <div class="metric-card"><div class="metric-label">total horas</div><div class="metric-value">${bheResumen.totalHoras} h</div></div>
          <div class="metric-card"><div class="metric-label">bruto</div><div class="metric-value">${fmt(bheResumen.bruto)}</div></div>
          <div class="metric-card"><div class="metric-label">descuento 15,25%</div><div class="metric-value text-warning">${fmt(bheResumen.descuento)}</div></div>
          <div class="metric-card"><div class="metric-label">líquido</div><div class="metric-value">${fmt(bheResumen.liquido)}</div></div>
        </div>
        <table class="detail-table">
          <thead><tr><th>fecha</th><th>entrada</th><th>salida</th><th>jornada</th><th>horas</th><th>valor hora</th><th>monto</th></tr></thead>
          <tbody>${bheResumen.detalle.map(d=>`<tr class="${d.esFeriado?'row-feriado':''}">
            <td>${d.fecha}</td><td>${d.entrada}</td><td>${d.salida||'—'}</td>
            <td>${d.esFeriado?'feriado ×1.5':'ordinaria'}</td>
            <td>${d.horas.toFixed(2)}</td><td>${fmt(d.valorHora)}</td><td>${fmt(d.montoJornada)}</td></tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    document.getElementById('pdf-actions-bhe').style.display = 'flex';
  });

  document.getElementById('btn-pdf-bhe').addEventListener('click', () => {
    if (bheResumen) PDF.generarPDFBHE(bheResumen);
  });
})();
</script>
</body>
</html>
